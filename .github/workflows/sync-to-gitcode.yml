name: Sync Result Files to GitCode

on:
  push:
    branches:
      - master
    paths:
      - 'output/result.txt'
      - 'output/result.m3u'
  workflow_run:
    workflows:
      - "Update schedule"
      - "Sync Fork Schedule"
    types: [completed]

jobs:
  sync-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Configure Git Identity
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "github-actions@users.noreply.github.com"

      - name: Add GitCode Remote
        run: |
          git remote remove gitcode || true
          git remote add gitcode https://oauth2:${{ secrets.GITCODE_PAT }}@gitcode.com/JayCody11/iptv-api.git

      - name: Fetch GitCode Main Branch
        run: git fetch gitcode main

      - name: Check File Changes Against GitCode
        id: check_files
        run: |
          git diff --quiet HEAD gitcode/main -- output/ || echo "has_changes=true" >> $GITHUB_OUTPUT

      - name: Push Changes to GitCode
        if: steps.check_files.outputs.has_changes == 'true'
        run: |
          git push gitcode HEAD:main --force
