name: Sync to GitCode

on:
  push:
    branches:
      - master
      - gd
  workflow_run:
    workflows:
      - "Update schedule"
      - "Sync Fork Schedule"
    types:
      - completed  

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # 关键：完整克隆仓库，防止 shallow update 错误

      - name: Add GitCode remote
        run: |
          if git remote | grep -q gitcode; then
            git remote remove gitcode
          fi
          git remote add gitcode https://oauth2:${{ secrets.GITCODE_PAT }}@gitcode.com/JayCody11/iptv-api.git

      - name: Pull latest changes from GitCode
        run: |
          git fetch gitcode main --prune
          git merge --no-edit gitcode/main  # 保留远程的更新，防止冲突

      - name: Regenerate result files (如果需要)
        run: |
          # 这里可以放生成 result.m3u 和 result.txt 的脚本
          echo "#EXTM3U" > output/result.m3u
          echo "Generated at $(date)" > output/result.txt

      - name: Commit only result files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          mkdir -p output
          git add -f output/result.m3u output/result.txt
          git commit --allow-empty -m "Sync result files to GitCode"
          git push gitcode HEAD:refs/heads/main  # 推送到 GitCode 的 main 分支
