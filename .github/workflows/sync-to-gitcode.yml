name: Sync Result Files to GitCode

on:
  push:
    branches:
      - master
    paths:
      - 'output/result.txt'
      - 'output/result.m3u'
  workflow_run:
    workflows:
      - "Update schedule"
      - "Sync Fork Schedule"
    types: [completed]

jobs:
  sync-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Configure Git Identity
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "github-actions@users.noreply.github.com"

      - name: Add GitCode Remote
        run: |
          git remote remove gitcode || true
          git remote add gitcode https://oauth2:${{ secrets.GITCODE_PAT }}@gitcode.com/JayCody11/iptv-api.git

      - name: Detect Default Branch
        id: detect_branch
        run: |
          # 获取远程仓库的默认分支名称
          default_branch=$(git remote show gitcode | grep "HEAD branch" | awk '{print $3}')
          echo "default_branch=${default_branch}" >> $GITHUB_OUTPUT

      - name: Fetch GitCode Remote
        run: git fetch gitcode

      - name: Check File Changes Against GitCode
        id: check_files
        run: |
          # 使用动态获取的分支名称进行比较
          git diff --quiet HEAD gitcode/${{ steps.detect_branch.outputs.default_branch }} -- output/ || echo "has_changes=true" >> $GITHUB_OUTPUT

      - name: Push Changes to GitCode
        if: steps.check_files.outputs.has_changes == 'true'
        run: |
          # 使用动态分支名称进行推送
          git push gitcode HEAD:${{ steps.detect_branch.outputs.default_branch }} --force
