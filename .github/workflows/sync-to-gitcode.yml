name: Sync to GitCode

on:
  push:
    branches:
      - master
      - gd
  workflow_run:
    workflows:
      - "Update schedule"
      - "Sync Fork Schedule"
    types:
      - completed  

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # 关键：完整克隆仓库，防止 shallow update 错误

      - name: Add GitCode remote
        run: |
          git remote remove gitcode || true  # 先删除，防止已存在
          git remote add gitcode https://oauth2:${{ secrets.GITCODE_PAT }}@gitcode.com/JayCody11/iptv-api.git

      - name: Force push main branch to GitCode
        run: |
          git fetch origin main --prune
          git reset --hard origin/main  # 确保本地 main 和 GitHub 保持一致
          git push --force gitcode HEAD:refs/heads/main  # **强制推送到 GitCode 的 main 分支**

      - name: Commit only result files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          mkdir -p output
          git add -f output/result.m3u output/result.txt
          git commit --allow-empty -m "Sync result files to GitCode"
          git push --force gitcode HEAD:refs/heads/main  # **再次强制推送**

