name: Sync Result Files to GitCode

on:
  push:
    branches:
      - master  # 监控的分支名
    paths:       # 精准路径过滤
      - 'output/result.txt'
      - 'output/result.m3u'
  workflow_run:
    workflows:
      - "Update schedule"
      - "Sync Fork Schedule"
    types: [completed]

jobs:
  sync-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # 完整克隆历史记录

      - name: Configure Git Identity
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "github-actions@users.noreply.github.com"

      - name: Add GitCode Remote
        run: |
          git remote remove gitcode || true
          git remote add gitcode https://oauth2:${{ secrets.GITCODE_PAT }}@gitcode.com/JayCody11/iptv-api.git

      - name: Check File Changes
        id: check_files
        run: |
          git diff --quiet HEAD^ HEAD -- output/ || echo "has_changes=true" >> $GITHUB_OUTPUT

      - name: Commit and Push Changes
        if: steps.check_files.outputs.has_changes == 'true'
        run: |
          # 拉取最新代码防止冲突
          git fetch origin master
          git reset --hard origin/master
          
          # 仅提交目标文件
          git add -f output/result.m3u output/result.txt
          git commit -m "chore: auto-sync result files"
          
          # 推送到 GitCode
          git push gitcode HEAD:main
